name: Daily Market Zone Scanner
on:
  schedule:
    - cron: '*/15 * * * *' # Maine ise 15 minute kar diya hai, kyunki '0 18' toh din mein sirf ek baar chalta hai!
  workflow_dispatch: 
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - name: Install Dependencies
      run: |
        pip install pandas yfinance requests
    - name: Run Scanner Pipeline
      run: |
        python pipeline.py
    - name: Commit and Push if Changes Found
      run: |
        git config --global user.name 'GitHub Action Bot'
        git config --global user.email 'action@github.com'
        git add .
        git commit -m "Auto-updated Market Zones Data" || echo "No changes to commit"
        git push
